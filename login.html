<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เข้าสู่ระบบ — Pa Kang School Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Modern Light Theme - อิงจากหน้าแรก */
    --bg-main: #f8fafc;
    --bg-surface: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --border-light: #e2e8f0;
    --brand-primary: #2563eb;
    --brand-secondary: #38bdf8;
    --brand-glow: rgba(37, 99, 235, 0.15);
    --error: #ef4444;
    
    --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.1), 0 2px 4px -1px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.1), 0 4px 6px -2px rgba(15, 23, 42, 0.05);
    --radius-lg: 20px;
    --transition: all 0.3s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: 
      radial-gradient(circle at 15% 0%, var(--brand-glow) 0%, transparent 50%),
      radial-gradient(circle at 85% 100%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
    padding: 20px;
  }

  .login-wrapper {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }

  /* เส้นสีด้านบนการ์ด */
  .login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--brand-primary), var(--brand-secondary));
  }

  .brand-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand-mark {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, var(--brand-primary), #1e40af);
    display: grid; place-items: center; color: white;
    font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 24px;
    box-shadow: 0 8px 16px var(--brand-glow);
    margin: 0 auto 16px;
  }

  .brand-title {
    font-family: 'Kanit', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .brand-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .form-control {
    width: 100%;
    padding: 12px 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    background: #f8fafc;
    color: var(--text-primary);
    transition: var(--transition);
  }

  .form-control:focus {
    outline: none;
    border-color: var(--brand-primary);
    background: #ffffff;
    box-shadow: 0 0 0 3px var(--brand-glow);
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--brand-primary);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-family: 'Kanit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .btn-submit:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-submit:active {
    transform: translateY(1px);
  }

  .error-message {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: var(--error);
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
  }

  .error-message.active {
    display: block;
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    transition: var(--transition);
  }

  .back-link:hover {
    color: var(--brand-primary);
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-header">
      <div class="brand-mark">ปก</div>
      <h1 class="brand-title">เข้าสู่ระบบ</h1>
      <p class="brand-subtitle">ศูนย์รวมบริการออนไลน์ โรงเรียนป่าก้าง</p>
    </div>

    <!-- กล่องข้อความแจ้งเตือนข้อผิดพลาด -->
    <div id="errorBox" class="error-message">
      ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username" class="form-label">ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">รหัสผ่าน (Password)</label>
        <input type="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-submit">
        เข้าสู่ระบบ
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
          <path d="M5 12h14M13 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <a href="index.html" class="back-link">← กลับไปหน้าแรก</a>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');

    // ถ้าเคย Login แล้ว ให้เด้งไปหน้า index.html เลย ไม่ต้องให้ Login ซ้ำ
    if (localStorage.getItem('pkschool_token')) {
        window.location.replace('index.html');
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรชเมื่อกด submit
      
      const usernameInput = document.getElementById('username').value;
      const passwordInput = document.getElementById('password').value;

      // ----------------------------------------------------
      // ส่วนจำลองการตรวจสอบรหัสผ่าน (Mock Authentication)
      // ให้ใช้ Username: admin / Password: 1234 เพื่อทดสอบ
      // ในระบบจริง คุณต้องส่งค่าผ่าน API (fetch) ไปยัง Server
      // ----------------------------------------------------
      if (usernameInput === 'admin' && passwordInput === '1234') {
        
        // ซ่อนกล่อง Error
        errorBox.classList.remove('active');
        
        // จำลองการสร้าง Token และเก็บสถานะลง localStorage
        const dummyToken = 'pk_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('pkschool_token', dummyToken);
        localStorage.setItem('pkschool_user', usernameInput);

        // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด (เพื่อความสวยงาม)
        const btn = loginForm.querySelector('.btn-submit');
        btn.innerHTML = 'กำลังเข้าสู่ระบบ...';
        btn.style.opacity = '0.8';

        // หน่วงเวลา 500ms เพื่อความสมจริง ก่อนเด้งไปหน้าแรก
        setTimeout(() => {
          window.location.replace('index.html');
        }, 500);

      } else {
        // หากรหัสผิด ให้แสดงกล่อง Error
        errorBox.classList.add('active');
        document.getElementById('password').value = ''; // เคลียร์ช่องรหัสผ่าน
        document.getElementById('password').focus();
      }
    });
  });
</script>

</body>
</html>
